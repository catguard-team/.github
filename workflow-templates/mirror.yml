name: 자경단 미러 동기화

# 자경단원의 원본 레포 → 자경단 org 미러로 자동 동기화.
# push마다 즉시 + 6시간 안전망 + 수동 실행.
#
# 셋업: https://github.com/catguard-team/.github/blob/main/MIRROR_SETUP.md

on:
  push:
    branches: ["**"]
    tags: ["**"]
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

jobs:
  sync:
    name: 원본 → 자경단 미러
    runs-on: ubuntu-latest
    steps:
      - name: 원본 전체 클론
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 자경단 미러로 push
        env:
          # ↓↓↓ 미러 셋업 시 한 줄만 본인 미러 경로로 바꾸세요 ↓↓↓
          MIRROR: catguard-team/미러레포명
          # ↑↑↑ 여기까지 ↑↑↑
          TOKEN: ${{ secrets.MIRROR_PAT }}
        run: |
          set -euo pipefail
          git remote add mirror "https://x-access-token:${TOKEN}@github.com/${MIRROR}.git"
          git push --mirror mirror
