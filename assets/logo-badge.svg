<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="자경단 배지">
  <title>고양이 자경단 배지</title>
  <defs>
    <path id="ring" d="M100,100 m-78,0 a78,78 0 1,1 156,0 a78,78 0 1,1 -156,0"/>
  </defs>

  <circle cx="100" cy="100" r="96" fill="#f5f1ea" stroke="#2a2a2a" stroke-width="3"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="#8b7355" stroke-width="1" stroke-dasharray="2 4"/>

  <!-- center paw -->
  <g fill="#2a2a2a" transform="translate(100,108)">
    <ellipse cx="0" cy="0" rx="22" ry="16"/>
    <ellipse cx="-18" cy="-20" rx="7" ry="9"/>
    <ellipse cx="-4" cy="-30" rx="7" ry="9"/>
    <ellipse cx="10" cy="-30" rx="7" ry="9"/>
    <ellipse cx="24" cy="-20" rx="7" ry="9"/>
  </g>

  <!-- circular text top -->
  <text font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif"
        font-size="14" font-weight="700" fill="#2a2a2a" letter-spacing="3">
    <textPath href="#ring" startOffset="14%">CAT VIGILANTE · 고양이 자경단 ·</textPath>
  </text>
</svg>
